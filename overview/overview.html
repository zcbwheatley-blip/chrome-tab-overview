<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="overview.css">
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1 id="greeting"></h1>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-right">
      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" placeholder="Search tabs..." id="searchInput" />
      </div>
    </div>
  </header>

  <div class="quote-block" id="quoteBlock">
    <p class="quote-text" id="quoteText"></p>
    <span class="quote-author" id="quoteAuthor"></span>
  </div>

  <div class="dashboard-columns">
    <div class="main-column">
      <div class="section-header">
        <h2>Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="tabCount"></div>
      </div>

      <main class="missions" id="tabContainer"></main>

      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-checkmark">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </div>
        <div class="empty-title">All clear</div>
        <div class="empty-subtitle">No tabs match your search</div>
      </div>
    </div>

    <aside class="sidebar-column">
      <div class="section-header">
        <h2>Top Sites</h2>
        <div class="section-line"></div>
      </div>
      <div class="top-sites" id="top-sites"></div>
    </aside>
  </div>

  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
      <div class="stat-bars" id="statBars"></div>
    </div>
    <div class="last-refresh">
      <span>Tab Overview</span>
    </div>
  </footer>
</div>

<div class="toast" id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<script type="module" src="overview.js"></script>
</body>
</html>
