<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Overview</title>
  <link rel="stylesheet" href="overview.css">
</head>
<body>
  <div class="overview-app">
    <header class="search-bar">
      <div class="search-bar__wrapper">
        <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          type="text"
          class="search-bar__input"
          placeholder="Search tabs by title or URL..."
          autofocus
        />
        <span class="search-bar__count"></span>
      </div>
    </header>
    <div class="main-layout">
      <main class="tab-container"></main>
      <aside class="sidebar">
        <div class="sidebar__header">
          <h3 class="sidebar__title">常用</h3>
        </div>
        <div class="top-sites" id="top-sites"></div>
      </aside>
    </div>
    <div class="empty-state" hidden>
      <p class="empty-state__text">No tabs match your search</p>
    </div>
  </div>
  <script src="overview.js"></script>
</body>
</html>
